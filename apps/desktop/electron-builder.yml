appId: com.baishou.baishou
productName: 白守
electronVersion: 41.1.1
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # 避免把历史打包目录递归打进 app.asar（曾导致安装包膨胀到 600MB+）
  - '!dist/**'
  - '!dist-*/**'
  - '!.turbo/**'
  - '!{detect-debug.log,eslint-report.json,setup.iss}'
asarUnpack:
  - resources/**
  - '**/*.node'
  - node_modules/better-sqlite3/**
  - node_modules/sqlite-vec/**
  - node_modules/dugite/**
extraResources:
  - from: resources/database
    to: database
win:
  executableName: BaiShou
  icon: resources/icon.png
# 正式 Windows 安装包由 setup.iss + scripts/build-inno.mjs 生成（build:win）。
# 下方 nsis 仅在使用 electron-builder --win 时生效，日常发布不经过此路径。
nsis:
  artifactName: BaiShou-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: BaiShou-${version}.${ext}
linux:
  target:
    - AppImage
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: BaiShou-${version}.${ext}
npmRebuild: true
# 供 electron-updater 识别更新源；构建时由 scripts/electron-builder.mjs 默认 --publish never，不在此发 Release。
publish:
  provider: github
  owner: foxletters-hq
  repo: BaiShou-Next
  releaseType: release
