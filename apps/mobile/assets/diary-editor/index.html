<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>Diary CM Editor</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;

        overflow: visible;

  <body>
    <div id="root"></div>
    <script src="diary-editor.bundle"></script>
