# GitHub「自动生成 Release 说明」配置（CI 中 generate_release_notes: true）
# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes
changelog:
  exclude:
    authors:
      - github-actions[bot]
      - dependabot[bot]
  categories:
    - title: 变更
      labels:
        - '*'
