name: 创意想法
description: 开放性想法与探索方向 — 不等于会纳入路线图，请勿直接提交功能 PR
title: '创意:'
labels:
  - interesting
body:
  - type: markdown
    attributes:
      value: |
        ## 关于创意想法

        我们欢迎脑洞与方向性讨论，但请注意：

        - **创意想法不等于会实现**，维护者会根据产品方向酌情考虑
        - 若你已想清楚具体功能、技术方案与改动范围，请改用 **「功能提议」** 模板
        - **请勿** 在未获同意前直接提交功能 PR

        贡献政策：[贡献指南](https://github.com/Anson-Trio/BaiShou-Next/blob/main/docs/2-Submit/2-Contributing-Guide.md)

  - type: textarea
    id: description
    attributes:
      label: 创意描述
      description: 分享你的想法，以及为什么觉得有价值
      placeholder: 例如：希望 AI 能更主动地发起互动，而不只是被动回复
    validations:
      required: true

  - type: textarea
    id: inspiration
    attributes:
      label: 灵感来源（可选）
      description: 是否有参考产品、场景或使用案例？
      placeholder: 可选填写
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 版本与设备
      description: 可选
      placeholder: Next 1.0.x，设备或系统版本
    validations:
      required: false
