name: Bug 反馈
description: 程序出错、功能异常、与预期不符 — 我们最欢迎此类 Issue 与修复 PR
title: 'Bug: '
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        ## 我们最欢迎的贡献类型

        **Bug 报告与 Bug 修复 PR** 是我们最愿意处理与合并的类别。

        提交前建议先 [搜索已有 Issue](https://github.com/Anson-Trio/BaiShou-Next/issues)，避免重复反馈。

        贡献政策：[贡献指南](https://github.com/Anson-Trio/BaiShou-Next/blob/main/docs/2-Submit/2-Contributing-Guide.md)

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请说明实际发生了什么，以及你期望的正确行为
      placeholder: 例如：切换伙伴头像后，聊天界面头像没有刷新，需要退出重进才更新
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 若能稳定复现，请按顺序列出操作步骤
      placeholder: |
        1.
        2.
        3.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 版本与设备
      description: 如 Next 1.0.16、Windows 11、Redmi Turbo 3、HarmonyOS 6.x
      placeholder: Next 1.0.x，桌面端/移动端，设备或系统版本
    validations:
      required: false
