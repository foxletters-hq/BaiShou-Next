name: Sync Fork with Upstream

on:
  schedule:
    # 每天 UTC 0:00（北京时间上午 8:00）自动运行
    - cron: '0 12 * * *'
  workflow_dispatch:  # 允许你手动点击运行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream repository
        run: git remote add upstream https://github.com/Anson-Trio/BaiShou-Next.git

      - name: Fetch upstream changes
        run: git fetch upstream

      - name: Merge upstream main branch
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "Merge upstream updates"

      - name: Push merged changes to fork
        run: git push origin main
