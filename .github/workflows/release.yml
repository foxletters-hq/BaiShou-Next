name: Build & Release

# 发版以本地 pnpm release:* 为主；此 workflow 仅作备用，在 Actions 页手动触发。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release 标签名（如 v1.0.0，用于产物文件名与 Release 标题）
        required: true
        type: string
      ref:
        description: 构建使用的分支或 commit（默认 main）
        required: false
        default: main
        type: string
      create_release:
        description: 构建完成后创建 GitHub Release 并上传附件
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  # ── Android APK ──────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app icons
        run: pnpm sync:icons

      - name: Sync app version
        run: pnpm sync:app-version

      - name: Prepare Android signing
        run: |
          mkdir -p apps/mobile/android/app
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > apps/mobile/android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> apps/mobile/android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> apps/mobile/android/key.properties
          echo "storeFile=app/upload-keystore.jks" >> apps/mobile/android/key.properties
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile/android/app/upload-keystore.jks

      - name: Build release APK
        run: pnpm --filter @baishou/mobile build:release
        env:
          BAISHOU_RELEASE_BUILD: '1'

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/BaiShou-*-Android.apk

  # ── Windows (Inno Setup) ───────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync app version
        run: pnpm sync:app-version

      - name: Build Windows installer
        run: pnpm --filter @baishou/desktop build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/dist/BaiShou-v*-Windows-Setup.exe

  # ── GitHub Release ────────────────────────────────────────
  release:
    name: Create GitHub Release
    if: ${{ inputs.create_release }}
    needs: [build-android, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Normalize artifact filenames
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          TARGET_APK="artifacts/BaiShou-${TAG}-Android.apk"
          for apk in artifacts/BaiShou-*-Android.apk; do
            [ -e "$apk" ] || continue
            if [ "$apk" != "$TARGET_APK" ]; then
              mv "$apk" "$TARGET_APK"
            fi
            break
          done

          TARGET_WIN="artifacts/BaiShou-${TAG}-Windows-Setup.exe"
          for installer in artifacts/BaiShou-*-Windows-Setup.exe; do
            [ -e "$installer" ] || continue
            if [ "$installer" != "$TARGET_WIN" ]; then
              mv "$installer" "$TARGET_WIN"
            fi
            break
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: 白守 ${{ inputs.tag }}
          body: |
            ## 白守 ${{ inputs.tag }}

            以纯白誓约，守护彼此一生。

            ### 下载
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Android | `-Android.apk` | 允许安装未知来源后安装，可覆盖旧 Flutter 版 |
            | Windows | `-Windows-Setup.exe` | Inno Setup 安装向导，默认 `Program Files\BaiShou` |

            **平台说明**：官方仅维护 Android 与 Windows。Linux 可自行编译；iOS / macOS 暂无计划。

            ### 更新内容
            请查看 [提交记录](https://github.com/${{ github.repository }}/commits/${{ inputs.tag }})
          files: |
            artifacts/BaiShou-${{ inputs.tag }}-Android.apk
            artifacts/BaiShou-${{ inputs.tag }}-Windows-Setup.exe
          draft: false
          prerelease: false
