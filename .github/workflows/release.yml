name: Build & Release

# 分端发版：main 合并后 push tag 触发构建
#   mobile/v1.2.4  → 仅 Android
#   desktop/v1.2.1 → 仅 Windows
# GitHub Release 按版本号统一为 v{semver}，多端产物合并到同一 Release
# 手动发版：Actions → Run workflow → 选择 mobile / desktop / both
on:
  push:
    tags:
      - 'mobile/v*'
      - 'desktop/v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 发版平台
        required: true
        type: choice
        options:
          - mobile
          - desktop
          - both
      ref:
        description: 构建使用的分支或 commit（默认 main）
        required: false
        default: main
        type: string
      create_release:
        description: 构建完成后创建 GitHub Release
        required: false
        default: true
        type: boolean

concurrency:
  group: release-${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && format('{0}-{1}', inputs.platform, inputs.ref) || github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      semver: ${{ steps.resolve.outputs.semver }}
      scope: ${{ steps.resolve.outputs.scope }}
      ref: ${{ steps.resolve.outputs.ref }}
      should_release: ${{ steps.resolve.outputs.should_release }}
      build_mobile: ${{ steps.resolve.outputs.build_mobile }}
      build_desktop: ${{ steps.resolve.outputs.build_desktop }}
      mobile_tag: ${{ steps.resolve.outputs.mobile_tag }}
      desktop_tag: ${{ steps.resolve.outputs.desktop_tag }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - id: resolve
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}"
          SHOULD_RELEASE="${{ github.event_name == 'workflow_dispatch' && inputs.create_release || 'true' }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SCOPE="${{ inputs.platform }}"
            MOBILE=$(node -p "require('./apps/mobile/src/version.json').version")
            DESKTOP=$(node -p "require('./apps/desktop/src/version.json').version")
            case "$SCOPE" in
              mobile)  TAG="mobile/v${MOBILE}"; SEMVER="$MOBILE" ;;
              desktop) TAG="desktop/v${DESKTOP}"; SEMVER="$DESKTOP" ;;
              both)
                if [ "$MOBILE" != "$DESKTOP" ]; then
                  echo "::error::both 发版要求两端 version.json 相同（mobile=${MOBILE}, desktop=${DESKTOP}）"
                  exit 1
                fi
                TAG="mobile/v${MOBILE}"
                SEMVER="$MOBILE"
                ;;
              *) echo "::error::未知 platform: $SCOPE"; exit 1 ;;
            esac
          elif [[ "${{ github.ref_name }}" =~ ^mobile/v(.+)$ ]]; then
            SCOPE="mobile"
            TAG="${{ github.ref_name }}"
            SEMVER="${BASH_REMATCH[1]}"
          elif [[ "${{ github.ref_name }}" =~ ^desktop/v(.+)$ ]]; then
            SCOPE="desktop"
            TAG="${{ github.ref_name }}"
            SEMVER="${BASH_REMATCH[1]}"
          else
            echo "::error::不支持的 tag: ${{ github.ref_name }}"
            exit 1
          fi

          BUILD_MOBILE="false"
          BUILD_DESKTOP="false"
          MOBILE_TAG=""
          DESKTOP_TAG=""
          if [ "$SCOPE" = "mobile" ] || [ "$SCOPE" = "both" ]; then
            BUILD_MOBILE="true"
            MOBILE_TAG="mobile/v${SEMVER}"
          fi
          if [ "$SCOPE" = "desktop" ] || [ "$SCOPE" = "both" ]; then
            BUILD_DESKTOP="true"
            DESKTOP_TAG="desktop/v${SEMVER}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "semver=$SEMVER" >> "$GITHUB_OUTPUT"
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"
          echo "build_mobile=$BUILD_MOBILE" >> "$GITHUB_OUTPUT"
          echo "build_desktop=$BUILD_DESKTOP" >> "$GITHUB_OUTPUT"
          echo "mobile_tag=$MOBILE_TAG" >> "$GITHUB_OUTPUT"
          echo "desktop_tag=$DESKTOP_TAG" >> "$GITHUB_OUTPUT"
          echo "release_tag=v${SEMVER}" >> "$GITHUB_OUTPUT"

      - name: Verify tag commit is on main
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          if ! git branch -r --contains "${{ github.sha }}" | grep -qE '(^|\s)origin/main$'; then
            echo "::error::Release tag 必须指向 main 上的 commit（先合并 PR 到 main，再在 main 上打 tag）"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # prepare 仅做版本校验，不 install；启用 pnpm cache 会在 post 阶段因路径不存在而失败

      - name: Verify version manifest matches tag
        shell: bash
        run: |
          set -euo pipefail
          SEMVER="${{ steps.resolve.outputs.semver }}"
          SCOPE="${{ steps.resolve.outputs.scope }}"
          MOBILE=$(node -p "require('./apps/mobile/src/version.json').version")
          DESKTOP=$(node -p "require('./apps/desktop/src/version.json').version")
          if [ "$SCOPE" = "mobile" ] || [ "$SCOPE" = "both" ]; then
            if [ "$MOBILE" != "$SEMVER" ]; then
              echo "::error::${{ steps.resolve.outputs.mobile_tag }} 与 mobile version.json (${MOBILE}) 不一致"
              exit 1
            fi
          fi
          if [ "$SCOPE" = "desktop" ] || [ "$SCOPE" = "both" ]; then
            if [ "$DESKTOP" != "$SEMVER" ]; then
              echo "::error::${{ steps.resolve.outputs.desktop_tag }} 与 desktop version.json (${DESKTOP}) 不一致"
              exit 1
            fi
          fi
          node scripts/sync-app-version.mjs --check

  build-android:
    name: Build Android APK
    needs: prepare
    if: needs.prepare.outputs.build_mobile == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
          cache: gradle

      - name: Cache Gradle wrappers and project metadata
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('pnpm-lock.yaml', 'apps/mobile/package.json', 'apps/mobile/app.json', 'apps/mobile/app.config.js', 'apps/mobile/plugins/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync generated assets
        run: pnpm sync

      - name: Build diary-editor WebView bundle
        run: pnpm --filter @baishou/mobile run build:diary-editor

      - name: Prepare Android signing
        run: |
          mkdir -p apps/mobile/android/app
          echo "storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}" > apps/mobile/android/key.properties
          echo "keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}" >> apps/mobile/android/key.properties
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" >> apps/mobile/android/key.properties
          echo "storeFile=app/upload-keystore.jks" >> apps/mobile/android/key.properties
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > apps/mobile/android/app/upload-keystore.jks

      - name: Build release APK
        run: pnpm --filter @baishou/mobile build:release
        env:
          BAISHOU_RELEASE_BUILD: '1'
          SKIP_SYNC: '1'
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_FILE: app/upload-keystore.jks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: release/BaiShou-*-Android.apk

  build-windows:
    name: Build Windows Installer
    needs: prepare
    if: needs.prepare.outputs.build_desktop == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync generated assets
        run: pnpm sync

      - name: Build Windows installer
        run: pnpm --filter @baishou/desktop build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: apps/desktop/dist/BaiShou-v*-Windows-Setup.exe

  release-mobile:
    name: Release Android
    if: |
      needs.prepare.outputs.should_release == 'true' &&
      needs.prepare.outputs.build_mobile == 'true' &&
      needs.build-android.result == 'success'
    needs: [prepare, build-android]
    runs-on: ubuntu-latest
    concurrency:
      group: gh-release-${{ needs.prepare.outputs.release_tag }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/

      - name: Normalize Android artifacts
        shell: bash
        run: |
          set -euo pipefail
          SEMVER="${{ needs.prepare.outputs.semver }}"
          TARGET="artifacts/BaiShou-v${SEMVER}-Android.apk"
          for apk in artifacts/BaiShou-*-Android.apk; do
            [ -e "$apk" ] || continue
            if [ "$apk" != "$TARGET" ]; then mv "$apk" "$TARGET"; fi
            break
          done
          cp "$TARGET" artifacts/BaiShou-Android.apk
          ls -la artifacts/

      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          SEMVER="${{ needs.prepare.outputs.semver }}"
          TAG="${{ needs.prepare.outputs.release_tag }}"
          SCOPE="${{ needs.prepare.outputs.scope }}"
          APPEND=false
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            APPEND=true
            echo "append=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "append=false" >> "$GITHUB_OUTPUT"
            HIGHEST=$(gh release list --repo "$REPO" --limit 100 --json tagName -q '.[].tagName' | sed 's/^v//' | sort -V | tail -1 || true)
            if [ -n "$HIGHEST" ] && [ "$(printf '%s\n' "$SEMVER" "$HIGHEST" | sort -V | tail -1)" != "$SEMVER" ]; then
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            else
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          CURRENT_TAG="${SCOPE}/v${SEMVER}"
          PREV=$(git tag -l "${SCOPE}/v*" --sort=-v:refname | grep -Fxv "$CURRENT_TAG" | head -1 || true)
          echo "previous_platform_tag=${PREV}" >> "$GITHUB_OUTPUT"
          node scripts/compose-release-body.mjs \
            --scope "$SCOPE" \
            --version "$SEMVER" \
            --repo "$REPO" \
            --append "$APPEND" \
            --output body.md

      - name: Create or update GitHub Release (Android)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: 白守 v${{ needs.prepare.outputs.semver }}
          append_body: ${{ steps.notes.outputs.append == 'true' }}
          body_path: body.md
          generate_release_notes: ${{ steps.notes.outputs.append != 'true' }}
          previous_tag: ${{ steps.notes.outputs.previous_platform_tag }}
          files: |
            artifacts/BaiShou-v${{ needs.prepare.outputs.semver }}-Android.apk
            artifacts/BaiShou-Android.apk
          draft: false
          prerelease: false
          make_latest: ${{ steps.notes.outputs.make_latest == 'true' }}

  release-desktop:
    name: Release Windows
    if: |
      needs.prepare.outputs.should_release == 'true' &&
      needs.prepare.outputs.build_desktop == 'true' &&
      needs.build-windows.result == 'success'
    needs: [prepare, build-windows]
    runs-on: ubuntu-latest
    concurrency:
      group: gh-release-${{ needs.prepare.outputs.release_tag }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: Normalize Windows artifacts
        shell: bash
        run: |
          set -euo pipefail
          SEMVER="${{ needs.prepare.outputs.semver }}"
          TARGET="artifacts/BaiShou-v${SEMVER}-Windows-Setup.exe"
          for exe in artifacts/BaiShou-*-Windows-Setup.exe; do
            [ -e "$exe" ] || continue
            if [ "$exe" != "$TARGET" ]; then mv "$exe" "$TARGET"; fi
            break
          done
          cp "$TARGET" artifacts/BaiShou-Windows-Setup.exe
          ls -la artifacts/

      - name: Compose release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          SEMVER="${{ needs.prepare.outputs.semver }}"
          TAG="${{ needs.prepare.outputs.release_tag }}"
          SCOPE="${{ needs.prepare.outputs.scope }}"
          APPEND=false
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            APPEND=true
            echo "append=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "append=false" >> "$GITHUB_OUTPUT"
            HIGHEST=$(gh release list --repo "$REPO" --limit 100 --json tagName -q '.[].tagName' | sed 's/^v//' | sort -V | tail -1 || true)
            if [ -n "$HIGHEST" ] && [ "$(printf '%s\n' "$SEMVER" "$HIGHEST" | sort -V | tail -1)" != "$SEMVER" ]; then
              echo "make_latest=false" >> "$GITHUB_OUTPUT"
            else
              echo "make_latest=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          CURRENT_TAG="${SCOPE}/v${SEMVER}"
          PREV=$(git tag -l "${SCOPE}/v*" --sort=-v:refname | grep -Fxv "$CURRENT_TAG" | head -1 || true)
          echo "previous_platform_tag=${PREV}" >> "$GITHUB_OUTPUT"
          node scripts/compose-release-body.mjs \
            --scope "$SCOPE" \
            --version "$SEMVER" \
            --repo "$REPO" \
            --append "$APPEND" \
            --output body.md

      - name: Create or update GitHub Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: 白守 v${{ needs.prepare.outputs.semver }}
          append_body: ${{ steps.notes.outputs.append == 'true' }}
          body_path: body.md
          generate_release_notes: ${{ steps.notes.outputs.append != 'true' }}
          previous_tag: ${{ steps.notes.outputs.previous_platform_tag }}
          files: |
            artifacts/BaiShou-v${{ needs.prepare.outputs.semver }}-Windows-Setup.exe
            artifacts/BaiShou-Windows-Setup.exe
          draft: false
          prerelease: false
          make_latest: ${{ steps.notes.outputs.make_latest == 'true' }}

  update-channel:
    name: Update release channel manifest
    needs: [prepare, release-mobile, release-desktop]
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.release-mobile.result == 'success' || needs.release-desktop.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Patch channel.json (Android)
        if: needs.release-mobile.result == 'success'
        run: |
          node scripts/update-release-channel.mjs \
            --platform android \
            --version "${{ needs.prepare.outputs.semver }}" \
            --tag "${{ needs.prepare.outputs.release_tag }}" \
            --version-code "$(node -p "require('./apps/mobile/src/version.json').versionCode")" \
            --repo "${{ github.repository }}"

      - name: Patch channel.json (Windows)
        if: needs.release-desktop.result == 'success'
        run: |
          DESKTOP_VER=$(node -p "require('./apps/desktop/src/version.json').version")
          node scripts/update-release-channel.mjs \
            --platform windows \
            --version "$DESKTOP_VER" \
            --tag "${{ needs.prepare.outputs.release_tag }}" \
            --repo "${{ github.repository }}"

      - name: Commit channel manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/channel.json
          if git diff --staged --quiet; then
            echo "channel.json 无变更"
            exit 0
          fi
          git commit -m "chore(release): 更新 releases/channel.json [skip ci]"
          git push origin main
